# conf/dataset_list.yaml
- name: hiha
  displayed_name: "HIHA"
  source: jo-mengr/hiha_100k
  cs_length: 64
  gene_filter_strings: ["RPS", "RPL", "MT"]
  split: test
  format: hub
  index_col: sample_idx
  bio_label_list:
    - AIFI_L1
    - AIFI_L2
    #- AIFI_L3
  batch_label_list:
    #- batch_id

- name: tabula_sapiens
  displayed_name: "Tabula Sapiens"
  source: jo-mengr/tabula_sapiens_schaefer
  cs_length: 64
  gene_filter_strings: ["RPS", "RPL", "MT"]
  split: test
  format: hub
  index_col: sample_idx
  bio_label_list:
    - cell_ontology_class
  batch_label_list:
    - donor

- name: human_pancreas
  displayed_name: "Human Pancreas"
  source: jo-mengr/human_pancreas_luecken
  cs_length: 64
  gene_filter_strings: ["RPS", "RPL", "MT"]
  split: test
  format: hub # hub | hf_disk | csv
  index_col: sample_idx
  bio_label_list:
    - celltype
  batch_label_list:
    - tech

  #No human disease dataset, because it doesnt have cell type labels, but disease labels
